- name: Deploy THORChain Wiki to VPS
  hosts: vps
  gather_facts: false
  vars:
    docker_image: "ghcr.io/reedtrullz/tcwiki:latest"
    container_name: "tcwiki"
    image_tag: "{{ lookup('env', 'GITHUB_SHA') | default(lookup('pipe', 'git -C ' ~ playbook_dir ~ ' rev-parse --short HEAD 2>/dev/null || echo latest'), true) }}"

  pre_tasks:
    - name: Get current container image
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: current_container
      ignore_errors: yes

    - name: Set previous image fact
      set_fact:
        previous_image: "{{ (current_container.container.Config.Image) if (current_container.container is not none) else 'none' }}"

  tasks:
    - name: Pull latest image from GHCR
      community.docker.docker_image:
        name: "{{ docker_image }}"
        source: pull
        force_source: yes

    - name: Stop and remove existing container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Start new container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "127.0.0.1:3003:3000"
        log_driver: "json-file"
        log_options:
          max-size: "10m"
          max-file: "3"
        healthcheck:
          test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
        env:
          NODE_ENV: production
          PORT: "3000"
          HOSTNAME: "0.0.0.0"
          VERSION: "{{ image_tag }}"

    - name: Wait for application to become healthy
      uri:
        url: "http://localhost:3003/api/health"
        return_content: yes
        timeout: 5
      register: health_check
      until: health_check is succeeded and health_check.json.status == "healthy"
      retries: 10
      delay: 5
      failed_when: false

    - name: Fail if application is not healthy
      fail:
        msg: "TCWiki health check failed: {{ health_check }}"
      when:
        - health_check is not succeeded or health_check.json.status != "healthy"
        - previous_image == "none"

    - name: Rollback to previous image on failure
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ previous_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "127.0.0.1:3003:3000"
        log_driver: "json-file"
        log_options:
          max-size: "10m"
          max-file: "3"
        healthcheck:
          test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
        env:
          NODE_ENV: production
          PORT: "3000"
          HOSTNAME: "0.0.0.0"
      when:
        - health_check is not succeeded or health_check.json.status != "healthy"
        - previous_image != "none"
      register: rollback

    - name: Fail with rollback message
      fail:
        msg: "Deployment failed, rolled back to {{ previous_image }}"
      when: rollback.changed

    - name: Verify container is running
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: container_info

    - name: Report deployment status
      debug:
        msg: "✅ TCWiki deployed successfully: {{ container_info.container.State.Status }}"
