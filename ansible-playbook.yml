- name: Deploy THORChain Wiki to VPS
  hosts: vps
  gather_facts: false
  vars:
    container_name: "tcwiki"
    candidate_container_name: "tcwiki-candidate"
    image_ref: "{{ lookup('env', 'IMAGE_REF') }}"
    app_version: "{{ lookup('env', 'APP_VERSION') }}"

  pre_tasks:
    - name: Require immutable image ref
      assert:
        that:
          - image_ref is defined
          - image_ref | length > 0
          - "'@sha256:' in image_ref"
          - app_version is defined
          - app_version | length > 0
        fail_msg: "IMAGE_REF must be a digest ref and APP_VERSION must be set."

    - name: Get current container image
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: current_container
      failed_when: false

    - name: Set previous image fact
      set_fact:
        previous_image: "{{ current_container.container.Config.Image if current_container.container is defined and current_container.container else 'none' }}"

    - name: Read previous version endpoint when container exists
      uri:
        url: "http://localhost:3003/api/version"
        return_content: yes
        timeout: 5
      register: previous_version_readback
      failed_when: false
      changed_when: false
      when: previous_image != "none"

    - name: Set previous runtime metadata facts
      vars:
        previous_env: "{{ current_container.container.Config.Env | default([]) if current_container.container is defined and current_container.container else [] }}"
        previous_endpoint_json: >-
          {{ previous_version_readback.json | default({}) if (previous_version_readback is defined and (previous_version_readback.status | default(0)) == 200) else {} }}
        previous_endpoint_version: "{{ previous_endpoint_json.version | default('') }}"
        previous_endpoint_commit: "{{ previous_endpoint_json.commit | default('') }}"
        previous_endpoint_image: "{{ previous_endpoint_json.image | default('') }}"
        previous_env_app_version: >-
          {{ (previous_env | select('match', '^APP_VERSION=') | list | first | default('APP_VERSION=unknown')) | regex_replace('^APP_VERSION=', '') }}
        previous_env_version: >-
          {{ (previous_env | select('match', '^VERSION=') | list | first | default('VERSION=unknown')) | regex_replace('^VERSION=', '') }}
        previous_env_commit_sha: >-
          {{ (previous_env | select('match', '^COMMIT_SHA=') | list | first | default('COMMIT_SHA=unknown')) | regex_replace('^COMMIT_SHA=', '') }}
        previous_env_image_ref: >-
          {{ (previous_env | select('match', '^IMAGE_REF=') | list | first | default('IMAGE_REF=' ~ previous_image)) | regex_replace('^IMAGE_REF=', '') }}
      set_fact:
        previous_app_version: >-
          {{ previous_endpoint_version if previous_endpoint_version not in ['', 'unknown', 'development'] else previous_env_app_version }}
        previous_version: >-
          {{ previous_env_version if previous_env_version not in ['', 'unknown'] else (previous_endpoint_version if previous_endpoint_version not in ['', 'unknown', 'development'] else previous_env_app_version) }}
        previous_commit_sha: >-
          {{ previous_endpoint_commit if previous_endpoint_commit not in ['', 'unknown'] else previous_env_commit_sha }}
        previous_image_ref: >-
          {{ previous_endpoint_image if previous_endpoint_image not in ['', 'unknown'] else previous_env_image_ref }}

  tasks:
    - block:
        - name: Pull immutable image from GHCR
          community.docker.docker_image:
            name: "{{ image_ref }}"
            source: pull
            force_source: yes

        - name: Mark live container as not yet replaced
          set_fact:
            deployment_replaced: false

        - name: Remove stale candidate container
          community.docker.docker_container:
            name: "{{ candidate_container_name }}"
            state: absent
          failed_when: false

        - name: Start candidate container
          community.docker.docker_container:
            name: "{{ candidate_container_name }}"
            image: "{{ image_ref }}"
            state: started
            restart_policy: "no"
            ports:
              - "127.0.0.1:3004:3000"
            log_driver: "json-file"
            log_options:
              max-size: "10m"
              max-file: "1"
            healthcheck:
              test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 40s
            env:
              NODE_ENV: production
              PORT: "3000"
              HOSTNAME: "0.0.0.0"
              APP_VERSION: "{{ app_version }}"
              VERSION: "{{ app_version }}"
              COMMIT_SHA: "{{ app_version }}"
              IMAGE_REF: "{{ image_ref }}"

        - name: Wait for candidate health
          uri:
            url: "http://localhost:3004/api/health"
            return_content: yes
            timeout: 5
          register: candidate_health_check
          until: candidate_health_check is succeeded and candidate_health_check.json.status == "healthy"
          retries: 10
          delay: 5

        - name: Verify candidate version
          uri:
            url: "http://localhost:3004/api/version"
            return_content: yes
            timeout: 5
          register: candidate_version_check
          until: >-
            candidate_version_check is succeeded
            and candidate_version_check.json.version == app_version
            and candidate_version_check.json.commit == app_version
            and candidate_version_check.json.image == image_ref
          retries: 6
          delay: 5

        - name: Verify candidate readiness shape
          uri:
            url: "http://localhost:3004/api/ready"
            return_content: yes
            timeout: 10
          register: candidate_ready_check
          until: >-
            candidate_ready_check is succeeded
            and candidate_ready_check.status in [200, 503]
            and candidate_ready_check.json.status in ["ready", "degraded"]
            and candidate_ready_check.json.ready in [true, false]
            and candidate_ready_check.json.version == app_version
            and candidate_ready_check.json.commit == app_version
            and candidate_ready_check.json.image == image_ref
            and candidate_ready_check.json.sources.midgard is defined
            and candidate_ready_check.json.sources.thornode is defined
          retries: 6
          delay: 10

        - name: Report degraded candidate readiness without blocking deploy
          debug:
            msg: "Candidate readiness degraded; app/version/image proof passed. Reasons: {{ candidate_ready_check.json.reasons | default([]) }}"
          when: candidate_ready_check.json.ready != true

        - name: Stop and remove existing container
          community.docker.docker_container:
            name: "{{ container_name }}"
            state: absent

        - name: Mark live container as replaced
          set_fact:
            deployment_replaced: true

        - name: Stop and remove candidate before live start
          community.docker.docker_container:
            name: "{{ candidate_container_name }}"
            state: absent

        - name: Start new container
          community.docker.docker_container:
            name: "{{ container_name }}"
            image: "{{ image_ref }}"
            state: started
            restart_policy: unless-stopped
            ports:
              - "127.0.0.1:3003:3000"
            log_driver: "json-file"
            log_options:
              max-size: "10m"
              max-file: "3"
            healthcheck:
              test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 40s
            env:
              NODE_ENV: production
              PORT: "3000"
              HOSTNAME: "0.0.0.0"
              APP_VERSION: "{{ app_version }}"
              VERSION: "{{ app_version }}"
              COMMIT_SHA: "{{ app_version }}"
              IMAGE_REF: "{{ image_ref }}"

        - name: Wait for application health
          uri:
            url: "http://localhost:3003/api/health"
            return_content: yes
            timeout: 5
          register: health_check
          until: health_check is succeeded and health_check.json.status == "healthy"
          retries: 10
          delay: 5

        - name: Verify deployed version
          uri:
            url: "http://localhost:3003/api/version"
            return_content: yes
            timeout: 5
          register: version_check
          until: version_check is succeeded and version_check.json.version == app_version
          retries: 6
          delay: 5

        - name: Verify deployed image from version endpoint
          assert:
            that:
              - version_check.json.image == image_ref
              - version_check.json.commit == app_version
            fail_msg: "Version endpoint returned image {{ version_check.json.image | default('missing') }}, expected {{ image_ref }}."

        - name: Verify deployed readiness
          uri:
            url: "http://localhost:3003/api/ready"
            return_content: yes
            timeout: 10
          register: ready_check
          until: >-
            ready_check is succeeded
            and ready_check.status in [200, 503]
            and ready_check.json.status in ["ready", "degraded"]
            and ready_check.json.ready in [true, false]
            and ready_check.json.version == app_version
            and ready_check.json.commit == app_version
            and ready_check.json.image == image_ref
            and ready_check.json.sources.midgard is defined
            and ready_check.json.sources.thornode is defined
          retries: 6
          delay: 10

        - name: Report degraded readiness without rolling back
          debug:
            msg: "Readiness degraded after deploy; app/version/image proof passed. Reasons: {{ ready_check.json.reasons | default([]) }}"
          when: ready_check.json.ready != true

      rescue:
        - name: Remove candidate container after failed deploy attempt
          community.docker.docker_container:
            name: "{{ candidate_container_name }}"
            state: absent
          failed_when: false

        - name: Roll back to previous image when available
          community.docker.docker_container:
            name: "{{ container_name }}"
            image: "{{ previous_image }}"
            state: started
            restart_policy: unless-stopped
            ports:
              - "127.0.0.1:3003:3000"
            log_driver: "json-file"
            log_options:
              max-size: "10m"
              max-file: "3"
            healthcheck:
              test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 40s
            env:
              NODE_ENV: production
              PORT: "3000"
              HOSTNAME: "0.0.0.0"
              APP_VERSION: "{{ previous_app_version }}"
              VERSION: "{{ previous_version }}"
              COMMIT_SHA: "{{ previous_commit_sha }}"
              IMAGE_REF: "{{ previous_image_ref }}"
          when: previous_image != "none" and deployment_replaced | default(false)

        - name: Verify rollback health when previous image exists
          uri:
            url: "http://localhost:3003/api/health"
            return_content: yes
            timeout: 5
          register: rollback_health
          until: rollback_health is succeeded and rollback_health.json.status == "healthy"
          retries: 10
          delay: 5
          when: previous_image != "none" and deployment_replaced | default(false)

        - name: Verify rollback version when previous image exists
          uri:
            url: "http://localhost:3003/api/version"
            return_content: yes
            timeout: 5
          register: rollback_version
          until: >-
            rollback_version is succeeded
            and rollback_version.json.version == previous_app_version
            and rollback_version.json.commit == previous_commit_sha
            and rollback_version.json.image == previous_image_ref
          retries: 6
          delay: 5
          when: previous_image != "none" and deployment_replaced | default(false)

        - name: Inspect rollback container when previous image exists
          community.docker.docker_container_info:
            name: "{{ container_name }}"
          register: rollback_container_info
          when: previous_image != "none" and deployment_replaced | default(false)

        - name: Assert rollback image and runtime metadata when previous image exists
          assert:
            that:
              - rollback_container_info.container.Config.Image == previous_image
              - "('APP_VERSION=' ~ previous_app_version) in rollback_container_info.container.Config.Env"
              - "('VERSION=' ~ previous_version) in rollback_container_info.container.Config.Env"
              - "('COMMIT_SHA=' ~ previous_commit_sha) in rollback_container_info.container.Config.Env"
              - "('IMAGE_REF=' ~ previous_image_ref) in rollback_container_info.container.Config.Env"
            fail_msg: "Rollback container did not restore image/version/runtime metadata for {{ previous_image }}."
          when: previous_image != "none" and deployment_replaced | default(false)

        - name: Fail deployment after rollback attempt
          fail:
            msg: "TCWiki deploy failed for {{ image_ref }}; rollback target was {{ previous_image }}."

    - name: Verify container image ref
      community.docker.docker_container_info:
        name: "{{ container_name }}"
      register: container_info

    - name: Assert running container uses requested image
      assert:
        that:
          - container_info.container.Config.Image == image_ref
        fail_msg: "Running container image {{ container_info.container.Config.Image | default('missing') }} does not match {{ image_ref }}."

    - name: Report deployment status
      debug:
        msg: "TCWiki deployed {{ container_info.container.Config.Image }} with version {{ app_version }}"
