name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  build-check:
    name: Lint + Typecheck + Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --include=optional
      - run: npm run audit:prod
      - run: npm run check:content
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
        env:
          CI: true
      - run: npm run smoke:standalone
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start:standalone

  publish:
    name: Build & publish image
    needs: [build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
      app_version: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute lowercase image name
        id: image_name
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image_name.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=long
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT_SHA=${{ github.sha }}
      - name: Compute digest image ref
        id: image
        run: echo "ref=${{ steps.image_name.outputs.name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
      - name: Summary
        run: |
          echo "### Image published" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.image_name.outputs.name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to VPS
    needs: [publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install community.docker
      - name: Set up SSH key and pinned known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_racknerd
          echo "${{ secrets.ANSIBLE_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_rsa_racknerd
          chmod 644 ~/.ssh/known_hosts
          ssh-keygen -F 198.23.137.16 -f ~/.ssh/known_hosts
      - name: Run Ansible deploy
        env:
          IMAGE_REF: ${{ needs.publish.outputs.image_ref }}
          APP_VERSION: ${{ needs.publish.outputs.app_version }}
        run: ansible-playbook -i inventory/hosts.yml ansible-playbook.yml
