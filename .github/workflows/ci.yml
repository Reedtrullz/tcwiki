name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '22'

jobs:
  build-check:
    name: Lint + Build + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      # Tailwind v4 (and its transitive native dependencies: lightningcss, @tailwindcss/oxide,
      # rolldown, sharp, etc.) require platform-specific binaries that are not always included
      # in the prebuilt packages on Linux CI runners. We install the linux-x64-gnu variants
      # explicitly so the production build succeeds in GitHub Actions.
      - run: |
          npm ci --include=optional
          npm install --no-save --no-package-lock \
            lightningcss-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            @rolldown/binding-linux-x64-gnu \
            @unrs/resolver-binding-linux-x64-gnu \
            @img/sharp-linux-x64 \
            @img/sharp-libvips-linux-x64
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          CI: true

  publish:
    name: Build & publish image
    needs: [build-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=sha-${{ github.sha }}
      - name: Summary
        run: |
          echo "### Image published" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Pull with: \`docker pull ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to VPS
    needs: [publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install community.docker
      - name: Set up SSH key and known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_racknerd
          chmod 600 ~/.ssh/id_rsa_racknerd
          ssh-keyscan -H 198.23.137.16 >> ~/.ssh/known_hosts
      - name: Run Ansible deploy
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: ansible-playbook -i inventory/hosts.yml ansible-playbook.yml
