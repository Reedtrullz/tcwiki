version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      react:
        patterns:
          - react
          - react-dom
    # ESLint 10 stays guarded until Next/eslint-config-next compatibility is
    # proven through this repo's CI gates.
    # TypeScript majors are intentionally not ignored: the MDX declaration in
    # src/types/mdx.d.ts removes the local MDX import blocker, but TS 6 PRs
    # still need explicit review plus lint/typecheck/build/e2e proof before merge.
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      # Runtime and type declarations intentionally stay on the Node 22 lane.
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Docker must match package.json engines and scripts/require-node22.mjs.
      - dependency-name: node
        update-types:
          - version-update:semver-major
    open-pull-requests-limit: 5
